<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SFC Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#07173a;
font-family:Arial;
color:white;
}

.wrapper{
display:flex;
height:100vh;
}

.sidebar{
width:280px;
background:#102766;
padding:30px;
}

.logo{
font-size:36px;
font-weight:bold;
margin-bottom:40px;
}

.item{
padding:16px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
transition:.2s;
}

.item:hover{
background:#1b3d91;
}

.main{
flex:1;
padding:50px;
}

.btn{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.card{
margin-top:20px;
background:#12286b;
padding:25px;
border-radius:18px;
width:260px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
padding:18px;
background:#12286b;
text-align:left;
}

td{
padding:18px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.logout{
margin-top:40px;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

🍽️ SFC

</div>

<div
class="item"
id="dashboardBtn"
>

🏠 Dashboard

</div>

<div
class="item"
id="rawBtn"
>

📦 Raw Material

</div>

<div class="item">

🔒 Preparation

</div>

<div class="item">

🔒 Recipe

</div>

<div class="item">

🔒 Menu

</div>

<div class="item">

🔒 HPP

</div>

<div class="logout">

<button
class="btn"
id="logoutBtn"
>

Logout

</button>

</div>

</div>


<div
class="main"
id="app"
>

</div>

</div>


<script>

const app =
document.getElementById(
"app"
);



function dashboard(){

app.innerHTML=`

<h1>

Dashboard

</h1>

<br>

<p>

Selamat datang 🚀

</p>

<div class="card">

<div>

Total Raw Material

</div>

<br>

<h1>

0

</h1>

</div>

`;

}



function rawMaterial(){

app.innerHTML=`

<div class="top">

<h1>

Raw Material

</h1>

<button
class="btn"
id="addBtn"
>

+ Tambah

</button>

</div>

<table>

<tr>

<th>Nama</th>

<th>Unit</th>

<th>Harga</th>

</tr>

<tr>

<td>Belum ada data</td>

<td>-</td>

<td>-</td>

</tr>

</table>

`;

setTimeout(()=>{

const btn=
document.getElementById(
"addBtn"
);

if(btn){

btn.onclick=function(){

alert(
"Form tambah dibuat berikutnya 🚀"
);

}

}

},10);

}



document
.getElementById(
"dashboardBtn"
)
.addEventListener(
"click",
dashboard
);



document
.getElementById(
"rawBtn"
)
.addEventListener(
"click",
rawMaterial
);



document
.getElementById(
"logoutBtn"
)
.addEventListener(
"click",
function(){

window.location.href=
"/";

}
);



dashboard();

</script>

</body>

</html>
