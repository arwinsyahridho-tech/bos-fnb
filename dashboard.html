<script>

const data=[];

function tambahBahan(){

const nama=
document.querySelector(
'input[placeholder="Tepung Terigu"]'
).value;

const merk=
document.querySelector(
'input[placeholder="Segitiga Biru"]'
).value;

const kategori=
document.querySelectorAll(
"select"
)[0].value;

const supplier=
document.querySelector(
'input[placeholder="Sari Murni"]'
).value;

const qty=
document.querySelector(
'input[value="1"]'
).value;

const buyUnit=
document.querySelectorAll(
"select"
)[1].value;

const harga=
document.querySelector(
'input[placeholder="12500"]'
).value;

const conversion=
document.querySelector(
'input[placeholder="1000"]'
).value;

const unit=
document.querySelectorAll(
"select"
)[2].value;

const waste=
document.querySelector(
'input[value="5"]'
).value;



if(
!nama||
!harga||
!conversion
){

alert(
"Lengkapi data dulu"
);

return;

}



const hargaUnit=

(
Number(harga)
/
Number(conversion)
)

.toFixed(2);



data.unshift({

nama,
merk,
kategori,
supplier,
qty,
buyUnit,
harga,
conversion,
unit,
waste,
hargaUnit

});

renderData();

resetForm();

}



function renderData(){

let html="";

data.forEach(item=>{

html+=`

<div class="card">

<div class="headerCard">

<div>

<div class="name">

${item.nama}

</div>

<div class="sub">

${item.kategori}
•
${item.merk}

</div>

</div>

<div>

Rp ${item.hargaUnit}
/ ${item.unit}

</div>

</div>


<div class="info">

<div class="box">

<div class="small">

Supplier

</div>

<div class="big">

${item.supplier}

</div>

</div>


<div class="box">

<div class="small">

Pembelian

</div>

<div class="big">

${item.qty}
${item.buyUnit}

</div>

</div>


<div class="box">

<div class="small">

Konversi

</div>

<div class="big">

${item.conversion}
${item.unit}

</div>

</div>


<div class="box">

<div class="small">

Waste

</div>

<div class="big">

${item.waste}%

</div>

</div>


<div class="box">

<div class="small">

Status

</div>

<div class="big">

ACTIVE

</div>

</div>

</div>

</div>

`;

});

document
.getElementById(
"dataArea"
)
.innerHTML=
html;

}



function resetForm(){

document.querySelector(
'input[placeholder="Tepung Terigu"]'
).value="";

document.querySelector(
'input[placeholder="Segitiga Biru"]'
).value="";

document.querySelector(
'input[placeholder="Sari Murni"]'
).value="";

document.querySelector(
'input[placeholder="12500"]'
).value="";

document.querySelector(
'input[placeholder="1000"]'
).value="";

}



document
.querySelector(
".btn"
)
.onclick=
tambahBahan;

</script>
