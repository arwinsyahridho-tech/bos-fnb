<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Smart Food Costing</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial;

background:#07173a;

color:white;

}

.wrapper{

display:flex;

height:100vh;

}

.sidebar{

width:280px;

background:#102766;

padding:30px;

}

.logo{

font-size:34px;

font-weight:bold;

margin-bottom:50px;

}

.menu{

display:flex;

flex-direction:column;

gap:18px;

}

.menu button{

background:none;

border:none;

color:white;

font-size:22px;

text-align:left;

cursor:pointer;

padding:12px;

border-radius:12px;

}

.menu button:hover{

background:#18367d;

}

.main{

flex:1;

padding:50px;

}

.card{

background:#12286b;

padding:25px;

border-radius:20px;

width:260px;

margin-top:20px;

}

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

}

.actionBtn{

padding:12px 20px;

background:#2563eb;

border:none;

color:white;

border-radius:12px;

cursor:pointer;

}

table{

width:100%;

margin-top:20px;

border-collapse:collapse;

}

th{

background:#12286b;

padding:18px;

text-align:left;

}

td{

padding:18px;

}

.logout{

margin-top:60px;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

🍽️ SFC

</div>

<div class="menu">

<button id="dashboardMenu">

🏠 Dashboard

</button>

<button id="rawMenu">

📦 Raw Material

</button>

<button>

🔒 Preparation

</button>

<button>

🔒 Recipe

</button>

<button>

🔒 Menu

</button>

<button>

🔒 HPP

</button>

</div>

<div class="logout">

<button
class="actionBtn"
onclick="logout()"
>

Logout

</button>

</div>

</div>

<div
class="main"
id="content"
>

</div>

</div>

<script>

const content =
document.getElementById(
"content"
);


function loadDashboard(){

content.innerHTML=`

<h1>

Dashboard

</h1>

<br>

<p>

Selamat datang 🚀

</p>

<div class="card">

<div>

Total Raw Material

</div>

<br>

<h2>

0

</h2>

</div>

`;

}


function loadRawMaterial(){

content.innerHTML=`

<div
class="topbar"
>

<h1>

Raw Material

</h1>

<button
class="actionBtn"
onclick="openAdd()"
>

+ Tambah

</button>

</div>

<table>

<tr>

<th>

Nama

</th>

<th>

Unit

</th>

<th>

Harga

</th>

</tr>

<tr>

<td>

Belum ada data

</td>

<td>

-

</td>

<td>

-

</td>

</tr>

</table>

`;

}


function openAdd(){

alert(
"Form tambah Raw Material dibuat berikutnya 🚀"
);

}


function logout(){

window.location.href="/";

}


document
.getElementById(
"dashboardMenu"
)
.onclick=
loadDashboard;


document
.getElementById(
"rawMenu"
)
.onclick=
loadRawMaterial;


loadDashboard();

</script>

</body>

</html>
