<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>BIYA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#07173a;

font-family:Arial;

color:white;

}

.box{

text-align:center;

}

button{

padding:14px 28px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

cursor:pointer;

}

.modal{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.6);

justify-content:center;

align-items:center;

z-index:9999;

}

.card{

background:white;

color:black;

padding:30px;

border-radius:20px;

width:340px;

}

input{

width:100%;

padding:12px;

margin-top:12px;

}

.loginBtn{

width:100%;

margin-top:15px;

}

</style>

</head>

<body>

<div class="box">

<h1>

🍽️ BIYA

</h1>

<br>

<p>

Business in Your Hand

</p>

<br>

<button id="openBtn">

Login

</button>

</div>


<div
id="modal"
class="modal"
>

<div class="card">

<h2>

Login

</h2>

<br>

<input
placeholder="Email"
>

<input
type="password"
placeholder="Password"
>

<button
id="loginBtn"
class="loginBtn"
>

Masuk

</button>

<button
id="closeBtn"
class="loginBtn"
>

Tutup

</button>

</div>

</div>


<script>

const modal =
document
.getElementById(
"modal"
);


document
.getElementById(
"openBtn"
)

.onclick
=
()=>{

modal.style.display=
"flex";

};



document
.getElementById(
"closeBtn"
)

.onclick
=
()=>{

modal.style.display=
"none";

};



document
.getElementById(
"loginBtn"
)

.onclick
=
()=>{

window.location.href=
"dashboard.html";

};

</script>

</body>

</html>
