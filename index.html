<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://pkjmkjyylgzjvhcreucc.supabase.co";

const SUPABASE_KEY =
"sb_publishable_Tq4d0o3PIAd_zh11uJa2uQ_M_zPIYFX";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

function openLogin(){

document
.getElementById("modal")
.style.display =
"flex";

}

function closeLogin(){

document
.getElementById("modal")
.style.display =
"none";

}

async function login(){

try{

const email =
document
.getElementById("email")
.value
.trim();

const password =
document
.getElementById("password")
.value;

if(!email||!password){

alert(
"Isi email & password dulu"
);

return;

}

const {
error
}
=
await
supabase
.auth
.signInWithPassword({

email,
password

});

if(error){

alert(
error.message
);

}else{

alert(
"Login berhasil 🚀"
);

closeLogin();

}

}catch(err){

alert(
"Script error:\n"
+
err.message
);

}

}

</script>
