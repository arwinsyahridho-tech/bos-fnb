<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Smart Food Costing
</title>

<style>

body{

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#07173a;

font-family:Arial;

color:white;

}

.box{

text-align:center;

}

button{

padding:14px 28px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

cursor:pointer;

}

.modal{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.5);

justify-content:center;

align-items:center;

}

.card{

background:white;

padding:30px;

border-radius:20px;

width:320px;

color:black;

}

input{

width:100%;

padding:12px;

margin-top:10px;

box-sizing:border-box;

}

</style>

</head>

<body>

<div class="box">

<h1>

🍽️ SMART FOOD COSTING

</h1>

<p>

Phase 1

</p>

<button
onclick="openLogin()"
>

Login

</button>

</div>

<div
id="modal"
class="modal"
>

<div class="card">

<h2>

Login

</h2>

<input
placeholder="Email"
>

<input
type="password"
placeholder="Password"
>

<br><br>

<button
onclick="fakeLogin()"
>

Masuk

</button>

<br><br>

<button
onclick="closeLogin()"
>

Tutup

</button>

</div>

</div>

<script>

function openLogin(){

document
.getElementById(
"modal"
)
.style
.display
=
"flex";

}

function closeLogin(){

document
.getElementById(
"modal"
)
.style
.display
=
"none";

}

function fakeLogin(){

alert(
"Login berhasil 🚀"
);

closeLogin();

}

</script>

</body>

</html>
